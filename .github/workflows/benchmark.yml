name: LLM Speed Benchmark

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      runs:
        description: 'Number of runs per model'
        required: false
        default: '1'
      include-expensive:
        description: 'Include expensive models'
        required: false
        default: 'false'
        type: boolean
      include-paid:
        description: 'Include paid models'
        required: false
        default: 'false'
        type: boolean
      effort-sweep:
        description: 'Test all reasoning effort levels'
        required: false
        default: 'false'
        type: boolean
      concurrency:
        description: 'Concurrent API calls'
        required: false
        default: '10'
      skip-tested:
        description: 'Skip already-tested models'
        required: false
        default: 'true'
        type: boolean
      retest-suspicious:
        description: 'Retest models with suspicious results (TPS>2000, tokens<500, TTFT=0)'
        required: false
        default: 'false'
        type: boolean

jobs:
  benchmark:
    name: Run LLM Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: true
          enable-cache: true
          cache-dependency-glob: |
            requirements.txt
            uv.lock

      - name: Install dependencies
        run: |
          uv pip install -r requirements.txt
          uv pip install httpx

      - name: Restore opencode config from secret
        env:
          OPENCODE_JSON_B64: ${{ secrets.OPENCODE_JSON_BASE64 }}
        run: |
          if [ -z "$OPENCODE_JSON_B64" ]; then
            echo "::error::OPENCODE_JSON_BASE64 secret not set. Please add it in repo settings."
            exit 1
          fi
          mkdir -p ~/.config/opencode
          echo "$OPENCODE_JSON_B64" | base64 -d | gunzip > ~/.config/opencode/opencode.json
          echo "Config restored. Providers configured: $(uv run python -c "import json; d=json.load(open('/home/runner/.config/opencode/opencode.json')); print(len(d.get('provider', {})))")"

      - name: Initialize database
        run: |
          uv run python cli.py init

      - name: List targets
        run: |
          uv run python cli.py list --verbose

      - name: Run benchmarks
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          ARGS="--runs ${{ github.event.inputs.runs || 1 }} --concurrency ${{ github.event.inputs.concurrency || 10 }}"

          if [ "${{ github.event.inputs.include-expensive }}" = "true" ]; then
            ARGS="$ARGS --include-expensive"
          fi

          if [ "${{ github.event.inputs.include-paid }}" = "true" ]; then
            ARGS="$ARGS --include-paid"
          fi

          if [ "${{ github.event.inputs.effort-sweep }}" = "true" ]; then
            ARGS="$ARGS --effort-sweep"
          fi

          if [ "${{ github.event.inputs.skip-tested }}" != "false" ]; then
            ARGS="$ARGS --skip-tested"
          fi

          if [ "${{ github.event.inputs.retest-suspicious }}" = "true" ]; then
            ARGS="$ARGS --retest-suspicious"
          fi

          echo "Running: python cli.py test $ARGS"
          uv run python cli.py test $ARGS -y

      - name: Generate report and site data
        if: always()
        run: |
          uv run python cli.py report --top 20 || true
          uv run python cli.py csv -o data/leaderboard.csv || true
          # Generate clean JSON for GitHub Pages
          uv run python scripts/build_site_json.py
          cp data/leaderboard.csv docs/leaderboard.csv || true
          # Copy data/ to docs/data/ so the HTML can fetch leaderboard.json
          mkdir -p docs/data
          cp docs/leaderboard.json docs/data/leaderboard.json

      - name: Upload benchmark data as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-data-${{ github.run_number }}
          path: |
            data/speedrun.db
            data/leaderboard.csv
            data/raw_tests_*.csv
          retention-days: 90

      - name: Commit updated data files
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add changed data files
          git add data/speedrun.db data/leaderboard.csv data/raw_tests_*.csv 2>/dev/null || true
          git add docs/leaderboard.json docs/leaderboard.csv docs/index.html 2>/dev/null || true

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update benchmark data [skip ci]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          enable_jekyll: false

      - name: Summary
        if: always()
        run: |
          echo "## Benchmark Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          uv run python scripts/generate_summary.py >> $GITHUB_STEP_SUMMARY || true
