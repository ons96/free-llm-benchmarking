name: LLM Speed Benchmark

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      runs:
        description: 'Number of runs per model'
        required: false
        default: '1'
      include-expensive:
        description: 'Include expensive models'
        required: false
        default: 'false'
        type: boolean
      include-paid:
        description: 'Include paid models (disables free-filter)'
        required: false
        default: 'true'
        type: boolean
      effort-sweep:
        description: 'Test all reasoning effort levels'
        required: false
        default: 'false'
        type: boolean
      concurrency:
        description: 'Concurrent API calls'
        required: false
        default: '10'
      skip-tested:
        description: 'Skip already-tested models'
        required: false
        default: 'true'
        type: boolean
      retest-suspicious:
        description: 'Retest models with suspicious results (TPS>2000, tokens<500, TTFT=0)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

# The benchmark takes ~2h; prevent overlapping runs from racing on the
# push to protected main. Let a running benchmark finish rather than cancel.
concurrency:
  group: llm-speed-benchmark
  cancel-in-progress: false

jobs:
  benchmark:
    name: Run LLM Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BENCHMARK_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: true
          enable-cache: true
          cache-dependency-glob: |
            requirements.txt
            uv.lock

      - name: Install dependencies
        run: |
          uv pip install -r requirements.txt
          uv pip install httpx

      - name: Restore opencode config from repo
        run: |
          # ponytail: config committed scrubbed (all {env:}/{file:} refs, 0 plaintext keys).
          # See scripts/build_runner_config.py for the scrub pipeline. Safe in public repo.
          mkdir -p ~/.config/opencode
          cp config/opencode-runner.json ~/.config/opencode/opencode.json
          echo "Config restored. Providers: $(uv run python -c "import json; d=json.load(open('/home/runner/.config/opencode/opencode.json')); print(len(d.get('provider', {})))")"

      - name: Build ~/.env and ~/.secrets/ from repo secrets
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          # ponytail: one-shot iterate over all GH secrets. Avoids 100-line env: block.
          # GH exposes to: toJSON(secrets) only since actions/runner#2339 (2024+).
          # Skip meta secrets BENCHMARK_PUSH_TOKEN, OPENCODE_JSON_BASE64, GITHUB_TOKEN.
          # Skip *_URL/*_BASE_URL/*_HOST vars (config endpoints, not keys).
          python3 <<'PYEOF'
          import json, os, re
          secrets = json.loads(os.environ["SECRETS_JSON"])
          home = os.path.expanduser("~")
          env_path = os.path.join(home, ".env")
          sec_dir = os.path.join(home, ".secrets")
          os.makedirs(sec_dir, exist_ok=True)
          skip_names = {"BENCHMARK_PUSH_TOKEN","OPENCODE_JSON_BASE64","GITHUB_TOKEN","GH_TOKEN","HF_TOKEN"}
          env_written = sec_written = 0
          with open(env_path, "w") as f:
              for name, val in sorted(secrets.items()):
                  if val is None or val == "":
                      continue
                  if name in skip_names:
                      continue
                  if name.endswith("_URL") or name.endswith("_BASE_URL") or name.endswith("_HOST"):
                      continue
                  # Determine if this is a file-secret or env-secret.
                  # Heuristic: matches the sync script rule (filename UPPERCASED with - -> _).
                  # Secret names with no _ or with _KEY suffix map to ~/.secrets/<lowercase-with-dashes>
                  # if there is a corresponding filename in ~/.secrets/ on the source machine.
                  # We can't see that here, so use a conservative rule:
                  #  - Pure uppercase no underscore (e.g. NVIDIA, CEREBRAS, GROQ, ANTHROPIC, AIBZ,
                  #    HAPUPPY, ANMIX, ZENMUX, BLAZE, BLUESMINDS, FREEMODEL, GEMINI, GRATISFY):
                  #    write to BOTH ~/.env (by name, e.g. NVIDIA_API_KEY) AND ~/.secrets/<lowercase>.
                  #    Extra env aliasing handles use of {env:NVIDIA_API_KEY} OR {file:~/.secrets/nvidia}.
                  #  - Names ending _KEY: assume ~/.secrets/<lowercase-with-dashes>
                  #  - Names ending _API_KEY: assume ~/.env var (e.g. NVIDIA_API_KEY, GROQ_API_KEY)
                  # Write to ~/.env always:
                  f.write(f"{name}={val}\n")
                  env_written += 1
                  # Also write to ~/.secrets/ for names where a file-secret ref likely exists.
                  # Conservative: write every secret to BOTH locations to cover both ref styles.
                  # Horse: low risk of false-positive since file content is the same key.
                  file_name = name.lower().replace("_", "-")
                  file_path = os.path.join(sec_dir, file_name)
                  with open(file_path, "w") as g:
                      g.write(val + ("\n" if not val.endswith("\n") else ""))
                  sec_written += 1
          print(f"~/.env: {env_written} keys, ~/.secrets/: {sec_written} files")
          PYEOF

      - name: Initialize database
        run: |
          uv run python cli.py init

      - name: Run benchmarks
        env:
          # ponytail: pass all secrets via environment so config.py {env:VAR} + {file:PATH} resolve correctly.
          # We don't enumerate them here because steps above already wrote them to disk + ~/.env.
          # cli.py inherits the shell env, which includes ~/.env via `set -a; . ~/.env; set +a` below.
          HOME: /home/runner
        run: |
          set -a
          . ~/.env
          set +a
          ARGS="--runs ${{ github.event.inputs.runs || 1 }} --concurrency ${{ github.event.inputs.concurrency || 10 }}"

          if [ "${{ github.event.inputs.include-expensive }}" = "true" ]; then
            ARGS="$ARGS --include-expensive"
          fi

          if [ "${{ github.event.inputs.include-paid }}" != "false" ]; then
            ARGS="$ARGS --include-paid"
          fi

          if [ "${{ github.event.inputs.effort-sweep }}" = "true" ]; then
            ARGS="$ARGS --effort-sweep"
          fi

          if [ "${{ github.event.inputs.skip-tested }}" != "false" ] && [ "${{ github.event.inputs.retest-suspicious }}" != "true" ]; then
            ARGS="$ARGS --skip-tested"
          fi

          if [ "${{ github.event.inputs.retest-suspicious }}" = "true" ]; then
            ARGS="$ARGS --retest-suspicious"
          fi

          echo "Running: python cli.py test $ARGS -y"
          uv run python cli.py test $ARGS -y

      - name: "Fail-safe: scan job log for leaked secrets"
        if: always()
        run: |
          # ponytail: defense-in-depth. GH masks secrets in logs natively, but grep catches
          # any leaked via error messages, traceback dumps, or stdout echoes.
          # Uses GH-provided $SECRETS_CONTEXT (JSON of all secret values).
          python3 <<'PYEOF'
          import json, os, subprocess, sys
          secrets_ctx = json.loads(os.environ.get("SECRETS_CONTEXT", "{}"))
          hits = []
          for name, val in secrets_ctx.items():
              if not val or len(val) < 12:
                  continue
              # Search the most recent step log file ($RUNNER_TEMP/_github_workflow/*.log)
              # Easier: just grep across /tmp and the workspace for now.
              try:
                  r = subprocess.run(
                      ["grep", "-rl", val, "/home/runner/work/", "--include=*.log", "--include=*.txt"],
                      capture_output=True, text=True, timeout=30
                  )
                  if r.stdout.strip():
                      hits.append((name, r.stdout.strip().splitlines()[0]))
              except Exception:
                  pass
          if hits:
              print(f"::error::SECRET LEAK DETECTED in {len(hits)} files:")
              for name, path in hits:
                  print(f"  {name} -> {path}")
              sys.exit(1)
          print(f"Scanned {len(secrets_ctx)} secrets, no leaks in /home/runner/work/.")
          PYEOF
        env:
          SECRETS_CONTEXT: ${{ toJSON(secrets) }}

      - name: Generate report and site data
        if: always()
        run: |
          uv run python cli.py report --top 20 || true
          uv run python cli.py csv -o data/leaderboard.csv || true
          # Generate clean JSON for GitHub Pages
          uv run python scripts/build_site_json.py || true
          cp data/leaderboard.csv docs/leaderboard.csv || true
          # Copy data/ to docs/data/ so the HTML can fetch leaderboard.json
          mkdir -p docs/data
          cp docs/leaderboard.json docs/data/leaderboard.json || true

      - name: Upload benchmark data as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-data-${{ github.run_number }}
          path: |
            data/speedrun.db
            data/leaderboard.csv
            data/raw_tests_*.csv
          retention-days: 90

      - name: Commit updated data files
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add changed data files
          git add data/speedrun.db data/leaderboard.csv data/raw_tests_*.csv 2>/dev/null || true
          git add docs/leaderboard.json docs/leaderboard.csv docs/data/leaderboard.json docs/index.html 2>/dev/null || true

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update benchmark data [skip ci]"
            # BENCHMARK_PUSH_TOKEN = admin PAT; branch protection has enforce_admins:false
            # so admin pushes bypass required status checks (Gitleaks).
            # Default GITHUB_TOKEN is github-actions[bot] (not admin) and would be rejected.
            if [ -z "${{ secrets.BENCHMARK_PUSH_TOKEN }}" ]; then
              echo "::warning::BENCHMARK_PUSH_TOKEN secret not set; push to protected main will fail. Set admin PAT w/ repo scope."
            fi
            # The benchmark runs ~2h; remote main advances during the run, so a
            # bare push is rejected (non-fast-forward). Rebase-and-retry. Data
            # files are regenerated each run so "ours wins" on conflict is fine.
            for attempt in 1 2 3 4 5; do
              if git push; then
                echo "push succeeded on attempt $attempt"; break
              fi
              echo "push rejected (attempt $attempt), rebasing onto origin/main"
              git fetch origin main
              # -X ours: our freshly-generated data wins any content conflict
              git rebase -X ours origin/main || { git rebase --abort; echo "::error::rebase failed unexpectedly"; exit 1; }
              if [ "$attempt" = "5" ]; then echo "::error::push failed after 5 attempts"; exit 1; fi
              sleep $((attempt * 5))
            done
          fi
        env:
          GH_TOKEN: ${{ secrets.BENCHMARK_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          enable_jekyll: false

      - name: Summary
        if: always()
        run: |
          echo "## Benchmark Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          uv run python scripts/generate_summary.py >> $GITHUB_STEP_SUMMARY || true
